<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="0" fill="#2C1A0E"/>

  <!-- page edges (right side, suggests a closed book seen slightly from the side) -->
  <g>
    <rect x="326" y="146" width="18" height="220" fill="#F5ECD8"/>
    <rect x="336" y="150" width="14" height="212" fill="#E6D8BC"/>
  </g>

  <!-- book cover -->
  <rect x="146" y="140" width="190" height="232" rx="10" fill="#C9A96E"/>
  <rect x="146" y="140" width="190" height="232" rx="10" fill="none" stroke="#8B6840" stroke-width="4"/>

  <!-- spine shadow -->
  <rect x="146" y="140" width="22" height="232" rx="10" fill="#8B6840" opacity="0.55"/>

  <!-- subtle cross emboss on cover, small and off-center so it reads as detail, not the whole icon -->
  <g stroke="#6B5436" stroke-width="7" stroke-linecap="round" opacity="0.75">
    <line x1="255" y1="205" x2="255" y2="275"/>
    <line x1="225" y1="230" x2="285" y2="230"/>
  </g>

  <!-- bookmark ribbon -->
  <path d="M292 92 L292 178 L308 160 L324 178 L324 92 Z" fill="#B5651D"/>
</svg>
